services:
  mysql:
    image: mariadb:10.4
    container_name: synth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-synth_root}
      MYSQL_DATABASE: ${MYSQL_DB:-synth_prices}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    restart: always
    env_file:
      - .env.validator.local
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ${HOME}/.bittensor:/root/.bittensor
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    env_file:
      - .env.validator.local
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:15.8
    restart: always
    env_file:
      - .env.validator.local
    ports:
      - "5432:5432"
    volumes:
      - postgres-validator-volume:/var/lib/postgresql/data
    command: >
      postgres -c statement_timeout=300000 -c idle_in_transaction_session_timeout=600000
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-validator-volume:
  mysql-data:
